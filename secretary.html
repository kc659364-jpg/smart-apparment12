<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Owner - Stark Industries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="secretary.css" rel="stylesheet">
</head>
<body>

<div class="form-wrapper">
    <div class="card p-5 mx-auto">
        <h3>Add New Owner</h3>
        
        <form action="add-owner.php" method="POST">
            <input type="hidden" name="block_name" id="hiddenBlock">

            <div class="mb-4">
                <label class="form-label">Owner Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter Full Name" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Flat Number</label>
                <input type="text" name="flat_no" class="form-control" placeholder="e.g. A-101" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contact Number</label>
                <input type="text" name="contact" class="form-control" placeholder="Enter 10-digit Number" required>
            </div>

             <div class="mb-4">
                <label class="form-label">PASSWORD</label>
                <input type="text" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" name="submit" class="btn btn-stark w-100">Save Owner Data</button>
        </form>

        <div class="mt-4 pt-2">
            <a href="javascript:history.back()" class="btn btn-back w-100">⬅ Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
    // Ye script page load hote hi block name set kar dega
    window.onload = function() {
        let savedBlock = localStorage.getItem("loginBlock");
        if(savedBlock) {
            document.getElementById('hiddenBlock').value = savedBlock;
        }
    }
</script>

</body>
</html>
