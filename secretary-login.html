<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretary Login - Stark Industries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="secretary-login.css" rel="stylesheet">
</head>
<body>

    <div class="login-wrapper">
        <div class="form-container">
            <h3>Secretary Login</h3>

            <div class="mb-4">
                <label class="form-label">Building Name</label>
                <input type="text" id="buildingName" class="form-control" placeholder="Enter Building Name">
            </div>

            <div class="mb-4">
                <label class="form-label">Access Password</label>
                <input type="password" id="buildingPass" class="form-control" placeholder="Enter Password">
            </div>

            <div class="mb-4">
                <label class="form-label">Assign Block</label>
                <select id="blockSelect" class="form-control">
                    <option value="">Select Block</option>
                </select>
            </div>

            <button onclick="login()" class="btn btn-stark w-100">Login System</button>

            <div class="mt-4 pt-2">
                <a href="javascript:history.back()" class="btn btn-back w-100">⬅ Back to Home</a>
            </div>
        </div>
    </div>

    <script src="new.js"></script>
</body>
</html>
