<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="owner-login.css" rel="stylesheet">
</head>
<body>

<div class="login-card shadow">
    <h3 class="text-center mb-4">Owner Login</h3>
    <form action="owner-login-check.php" method="POST">
        <div class="mb-3">
            <label class="form-label">Flat Number</label>
            <input type="text" name="flat_no" class="form-control" placeholder="EXAMPLE: A-101" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="PASSWORD" required>
        </div>
        <button type="submit" name="login" class="btn btn-primary w-100">Login</button>
    </form>
    <div class="mt-3 text-center">
        <a href="login.html" class="text-decoration-none">Back to Home</a>
    </div>
</div>

</body>
</html>
