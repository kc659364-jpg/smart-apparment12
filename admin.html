<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Create Building</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="admin.css" rel="stylesheet">
</head>
<body>

    <div class="stark-layout">
        <div class="form-container">
            <div class="arc-reactor-logo"></div>
            <h2>Create Building</h2>
            
            <form action="admin.php" method="POST">
                <div class="mb-4">
                    <label class="form-label">Building Name</label>
                    <input type="text" name="building_name" class="form-control" placeholder="Enter Building Name" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Access Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Set Secure Key" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Total Blocks</label>
                    <input type="number" name="total_blocks" class="form-control" placeholder="Number of Blocks (e.g. 5)" required>
                </div>

                <button type="submit" class="btn btn-stark w-100">Deploy Building</button>
            </form>

            <div class="mt-4 pt-2">
                <a href="javascript:history.back()" class="btn btn-back w-100 mb-3">⬅ Back to Previous</a>
                <a href="admin-dashboard.php" class="btn btn-outline-stark w-100">Go To Dashboard</a>
            </div>
        </div>
    </div>

</body>
</html>
